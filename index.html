<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Bunny To-Do List</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="header">

            <div class="bunny">
                🐰
            </div>

            <h1>
                Bunny To-Do List
            </h1>

            <p>
                soft productivity for chaotic humans ✨
            </p>

        </div>

        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="What needs to be done today? 🐇"
            >

            <button id="addBtn">
                Add Task
            </button>

        </div>

        <ul id="taskList"></ul>

        <div class="footer">
            🌸
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
